description: Tactacam PYD1598 PIR Sensor
compatible: "tactacam,pyd1598"
include: base.yaml

properties:
  direct-link-gpios:
    type: phandle-array
    required: true
    description: GPIO pin connected to the DIRECTLINK

  spi-peripheral:
    type: phandle
    required: true
    description: The SPI peripheral used for SERIN